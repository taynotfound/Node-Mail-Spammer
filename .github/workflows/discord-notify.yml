name: Discord Notifications

on:
  push:
  pull_request:
  issues:
  release:
  create:
  delete:
  fork:
  watch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: "https://discord.com/api/webhooks/1259597370014830593/Et-f9-kMZ8KMURQKz88Ux40iPsGnV700-aUIlxPuVY3SzEoqZMQALEQB2ZDgSt6fOnH_"
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          REPO_SHORT="${REPO##*/}"
          REPO_URL="https://github.com/${REPO}"
          ACTOR="${{ github.actor }}"
          ACTOR_URL="https://github.com/${ACTOR}"
          REF="${{ github.ref }}"
          BRANCH="${REF##refs/heads/}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          SHA_URL="${REPO_URL}/commit/${SHA}"
          BRANCH_URL="${REPO_URL}/tree/${BRANCH}"

          case $EVENT in
            push)
              COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
              COMMIT_URL="${{ github.event.head_commit.url }}"
              ADDED="${{ github.event.commits[0].added }}"
              COUNT="${{ github.event.size }}"
              if [ "$COUNT" -gt 1 ] 2>/dev/null; then
                COMMIT_LINE="[\`${SHORT_SHA}\`](${SHA_URL}) ${COMMIT_MSG} (+${COUNT} commits)"
              else
                COMMIT_LINE="[\`${SHORT_SHA}\`](${SHA_URL}) ${COMMIT_MSG}"
              fi
              PAYLOAD=$(jq -n \
                --arg content "📦 **[${REPO_SHORT}](${REPO_URL})** → [\`${BRANCH}\`](${BRANCH_URL})\n${COMMIT_LINE}\n— [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            pull_request)
              ACTION="${{ github.event.action }}"
              PR_TITLE="${{ github.event.pull_request.title }}"
              PR_URL="${{ github.event.pull_request.html_url }}"
              PR_NUM="${{ github.event.pull_request.number }}"
              BASE="${{ github.event.pull_request.base.ref }}"
              HEAD="${{ github.event.pull_request.head.ref }}"
              PAYLOAD=$(jq -n \
                --arg content "🔀 **[${REPO_SHORT}](${REPO_URL})** · PR ${ACTION}\n[#${PR_NUM} ${PR_TITLE}](${PR_URL})\n\`${HEAD}\` → \`${BASE}\` — [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            issues)
              ACTION="${{ github.event.action }}"
              ISSUE_TITLE="${{ github.event.issue.title }}"
              ISSUE_URL="${{ github.event.issue.html_url }}"
              ISSUE_NUM="${{ github.event.issue.number }}"
              PAYLOAD=$(jq -n \
                --arg content "🐛 **[${REPO_SHORT}](${REPO_URL})** · issue ${ACTION}\n[#${ISSUE_NUM} ${ISSUE_TITLE}](${ISSUE_URL})\n— [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            release)
              TAG="${{ github.event.release.tag_name }}"
              REL_URL="${{ github.event.release.html_url }}"
              REL_NAME="${{ github.event.release.name }}"
              PAYLOAD=$(jq -n \
                --arg content "🚀 **[${REPO_SHORT}](${REPO_URL})** · new release\n[${TAG} — ${REL_NAME}](${REL_URL})\n— [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            watch)
              PAYLOAD=$(jq -n \
                --arg content "⭐ **[${REPO_SHORT}](${REPO_URL})** got a star from [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            fork)
              FORK_URL="${{ github.event.forkee.html_url }}"
              FORK_FULL="${{ github.event.forkee.full_name }}"
              PAYLOAD=$(jq -n \
                --arg content "🍴 **[${REPO_SHORT}](${REPO_URL})** was forked → [${FORK_FULL}](${FORK_URL})\nby [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            create)
              REF_TYPE="${{ github.event.ref_type }}"
              REF_NAME="${{ github.event.ref }}"
              if [ "$REF_TYPE" = "branch" ]; then
                REF_LINK="[\`${REF_NAME}\`](${REPO_URL}/tree/${REF_NAME})"
              else
                REF_LINK="[\`${REF_NAME}\`](${REPO_URL}/releases/tag/${REF_NAME})"
              fi
              PAYLOAD=$(jq -n \
                --arg content "🌿 **[${REPO_SHORT}](${REPO_URL})** · new ${REF_TYPE} ${REF_LINK}\n— [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            delete)
              REF_TYPE="${{ github.event.ref_type }}"
              REF_NAME="${{ github.event.ref }}"
              PAYLOAD=$(jq -n \
                --arg content "🗑️ **[${REPO_SHORT}](${REPO_URL})** · deleted ${REF_TYPE} \`${REF_NAME}\`\n— [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
            *)
              PAYLOAD=$(jq -n \
                --arg content "⚡ **[${REPO_SHORT}](${REPO_URL})** · ${EVENT} by [${ACTOR}](${ACTOR_URL})" \
                --arg username "foxbot" \
                --arg avatar "https://github.com/taynotfound.png" \
                '{username: $username, avatar_url: $avatar, content: $content}')
              ;;
          esac

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
